<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOLES-Dispatch — Scenario Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa; --surface: #fff; --primary: #2563eb; --primary-light: #dbeafe;
    --danger: #fee2e2; --danger-border: #f87171; --text: #1e293b; --muted: #64748b;
    --border: #e2e8f0; --header-bg: #f1f5f9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  header .actions { display: flex; gap: 8px; margin-left: auto; }
  header input[type="text"] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; width: 180px; }
  button { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  button:hover { background: var(--header-bg); }
  button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  button.primary:hover { background: #1d4ed8; }

  /* Tabs */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; color: var(--muted); font-weight: 500; }
  .tab:hover { color: var(--text); background: var(--header-bg); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* Table container */
  .table-container { padding: 16px 24px; overflow-x: auto; }
  .table-desc { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

  /* Spreadsheet table */
  table { border-collapse: collapse; font-size: 13px; width: auto; min-width: 100%; }
  th { background: var(--header-bg); padding: 6px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); position: sticky; top: 0; white-space: nowrap; cursor: help; }
  td { padding: 0; border: 1px solid var(--border); min-width: 80px; position: relative; }
  td.row-header { background: var(--header-bg); padding: 6px 12px; font-weight: 600; min-width: 100px; }
  td input { width: 100%; padding: 6px 10px; border: none; font-size: 13px; font-family: inherit; background: transparent; outline: none; }
  td input:focus { background: var(--primary-light); }
  td.invalid { background: var(--danger); }
  td.invalid input { background: var(--danger); }

  /* Status bar */
  .status { padding: 8px 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); background: var(--surface); position: fixed; bottom: 0; width: 100%; }
  .status .error-count { color: var(--danger-border); font-weight: 600; }

  /* Tooltip */
  th .tooltip { display: none; position: absolute; background: var(--text); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 400; z-index: 10; white-space: nowrap; top: 100%; left: 0; margin-top: 4px; }
  th:hover .tooltip { display: block; }

  /* Hidden file input */
  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <h1>EOLES-Dispatch Scenario Editor</h1>
  <label>Scenario name: <input type="text" id="scenarioName" value="baseline" /></label>
  <div class="actions">
    <button onclick="document.getElementById('folderInput').click()">Load Folder (Full Scenario)</button>
    <input type="file" id="folderInput" webkitdirectory onchange="loadFolder(event)" />
    <button onclick="document.getElementById('fileInput').click()">Load CSVs</button>
    <input type="file" id="fileInput" multiple accept=".csv" onchange="loadCSVs(event)" />
    <button class="primary" onclick="exportZip()">Download ZIP</button>
  </div>
</header>

<div class="tabs" id="tabBar"></div>
<div class="table-container" id="tableContainer"></div>
<div class="status" id="statusBar">Ready — edit cells directly, then export as ZIP</div>

// ─── State ───

let data = {};       // { tableId: [ {col: val, ...}, ... ] }
let activeTab = SCHEMA[0].id;

// ─── CSV parsing/serialization ───

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = vals[i] || '');
    return row;
  });
}

function toCSV(tableId) {
  const rows = data[tableId];
  if (!rows || !rows.length) return '';
  const headers = Object.keys(rows[0]);
  const lines = [headers.join(',')];
  rows.forEach(row => lines.push(headers.map(h => row[h] ?? '').join(',')));
  return lines.join('\n') + '\n';
}

// ─── Load CSVs ───

function loadCSVFiles(files, statusPrefix) {
  const validFiles = [...files].filter(f => f.name.endsWith('.csv') && SCHEMA.find(s => s.id === f.name.replace('.csv', '')));
  if (!validFiles.length) { updateStatus('No matching CSV files found'); return; }
  let loaded = 0;
  for (const file of validFiles) {
    const name = file.name.replace('.csv', '');
    const reader = new FileReader();
    reader.onload = (e) => {
      data[name] = parseCSV(e.target.result);
      loaded++;
      if (loaded === validFiles.length) {
        renderTabs();
        switchTab(activeTab);
        updateStatus(`${statusPrefix || 'Loaded'} ${loaded} table(s)`);
      }
    };
    reader.readAsText(file);
  }
}

function loadCSVs(event) { loadCSVFiles(event.target.files, 'Loaded'); }
function loadFolder(event) {
  const files = event.target.files;
  if (files.length > 0 && files[0].webkitRelativePath) {
    const folderName = files[0].webkitRelativePath.split('/')[0];
    document.getElementById('scenarioName').value = folderName;
  }
  loadCSVFiles(files, 'Loaded from folder:');
}

// ─── Drag & drop ───

document.addEventListener('DOMContentLoaded', () => {
  document.body.addEventListener('dragover', (e) => { e.preventDefault(); document.body.style.outline = '3px dashed var(--primary)'; });
  document.body.addEventListener('dragleave', () => { document.body.style.outline = ''; });
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    document.body.style.outline = '';
    const items = e.dataTransfer.items;
    if (items && items.length && items[0].webkitGetAsEntry) {
      const entries = [];
      let pending = 0;
      for (const item of items) {
        const entry = item.webkitGetAsEntry();
        if (entry && entry.isDirectory) {
          pending++;
          const reader = entry.createReader();
          reader.readEntries((dirEntries) => {
            for (const de of dirEntries) {
              if (de.isFile && de.name.endsWith('.csv')) {
                pending++;
                de.file(f => { entries.push(f); pending--; if (pending === 0) loadCSVFiles(entries, 'Dropped:'); });
              }
            }
            pending--;
            if (pending === 0 && entries.length) loadCSVFiles(entries, 'Dropped:');
          });
        } else if (entry && entry.isFile && entry.name.endsWith('.csv')) {
          pending++;
          entry.file(f => { entries.push(f); pending--; if (pending === 0) loadCSVFiles(entries, 'Dropped:'); });
        }
      }
    } else {
      loadCSVFiles(e.dataTransfer.files, 'Dropped:');
    }
  });
});

// ─── Export ZIP ───

async function exportZip() {
  syncFromDOM();
  const zip = new JSZip();
  const name = document.getElementById('scenarioName').value || 'scenario';
  const folder = zip.folder(name);
  let count = 0;
  for (const schema of SCHEMA) {
    if (data[schema.id] && data[schema.id].length) {
      folder.file(schema.id + '.csv', toCSV(schema.id));
      count++;
    }
  }
  if (count === 0) { updateStatus('Nothing to export — load or create a scenario first'); return; }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.zip';
  a.click();
  updateStatus(`Exported ${count} tables as ${name}.zip`);
}

// ─── Initialize with baseline ───

function initBaseline() {
  for (const schema of SCHEMA) {
    if (BASELINE[schema.id]) {
      data[schema.id] = JSON.parse(JSON.stringify(BASELINE[schema.id]));
    } else {
      data[schema.id] = [];
    }
  }
}

// ─── Rendering ───

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  for (const schema of SCHEMA) {
    const tab = document.createElement('div');
    tab.className = 'tab' + (schema.id === activeTab ? ' active' : '');
    tab.textContent = schema.label;
    tab.onclick = () => switchTab(schema.id);
    bar.appendChild(tab);
  }
}

function switchTab(id) {
  syncFromDOM();
  activeTab = id;
  renderTabs();
  renderTable(id);
}

function renderTable(tableId) {
  const container = document.getElementById('tableContainer');
  const schema = SCHEMA.find(s => s.id === tableId);
  const rows = data[tableId] || [];

  if (!rows.length) {
    container.innerHTML = `<div class="table-desc">${schema.desc}</div><p style="color:var(--muted);padding:20px 0;">No data loaded for this table. Load CSVs or use baseline values.</p>`;
    return;
  }

  let html = `<div class="table-desc">${schema.desc}</div><table id="activeTable" data-id="${tableId}">`;

  if (schema.columns) {
    // Explicit column schema (thr_specs, rsv_req, str_vOM)
    html += '<tr>';
    for (const col of schema.columns) {
      html += `<th>${col.label}<span class="tooltip">${col.desc || col.key}${col.min !== undefined ? ` [min: ${col.min}]` : ''}${col.max !== undefined ? ` [max: ${col.max}]` : ''}</span></th>`;
    }
    html += '</tr>';
    rows.forEach((row, ri) => {
      html += '<tr>';
      for (const col of schema.columns) {
        const val = row[col.key] ?? '';
        if (col.key === schema.columns[0].key) {
          html += `<td class="row-header">${val}</td>`;
        } else {
          const cls = validateCell(col, val) ? '' : ' invalid';
          html += `<td class="${cls}"><input type="text" value="${val}" data-row="${ri}" data-col="${col.key}" oninput="onCellEdit(this)" /></td>`;
        }
      }
      html += '</tr>';
    });
  } else {
    // Area-column tables (capa, maxAF, links, etc.)
    const headers = Object.keys(rows[0]);
    const rowKey = headers[0];
    const areaCols = headers.slice(1);
    const v = schema.validation || {};
    html += `<tr><th>${rowKey}</th>`;
    for (const ac of areaCols) {
      html += `<th>${ac}<span class="tooltip">${schema.desc}</span></th>`;
    }
    html += '</tr>';
    rows.forEach((row, ri) => {
      html += `<tr><td class="row-header">${row[rowKey]}</td>`;
      for (const ac of areaCols) {
        const val = row[ac] ?? '';
        const cls = validateValue(v, val) ? '' : ' invalid';
        html += `<td class="${cls}"><input type="text" value="${val}" data-row="${ri}" data-col="${ac}" oninput="onCellEdit(this)" /></td>`;
      }
      html += '</tr>';
    });
  }

  html += '</table>';
  container.innerHTML = html;
  updateErrorCount();
}

// ─── Validation ───

function validateCell(colSchema, val) {
  if (colSchema.type === 'text' || colSchema.type === 'boolean') return true;
  const num = Number(val);
  if (isNaN(num)) return false;
  if (colSchema.min !== undefined && num < colSchema.min) return false;
  if (colSchema.max !== undefined && num > colSchema.max) return false;
  return true;
}

function validateValue(validation, val) {
  if (val === '' || val === undefined) return true;
  const num = Number(val);
  if (isNaN(num)) return false;
  if (validation.min !== undefined && num < validation.min) return false;
  if (validation.max !== undefined && num > validation.max) return false;
  return true;
}

function onCellEdit(input) {
  const td = input.parentElement;
  const schema = SCHEMA.find(s => s.id === activeTab);
  const ri = parseInt(input.dataset.row);
  const col = input.dataset.col;

  // Update data
  if (data[activeTab] && data[activeTab][ri]) {
    data[activeTab][ri][col] = input.value;
  }

  // Validate
  let valid;
  if (schema.columns) {
    const colSchema = schema.columns.find(c => c.key === col);
    valid = colSchema ? validateCell(colSchema, input.value) : true;
  } else {
    valid = validateValue(schema.validation || {}, input.value);
  }
  td.className = valid ? '' : 'invalid';
  updateErrorCount();
}

function updateErrorCount() {
  const count = document.querySelectorAll('td.invalid').length;
  const status = document.getElementById('statusBar');
  if (count > 0) {
    status.innerHTML = `<span class="error-count">${count} invalid cell(s)</span> — fix highlighted values before exporting`;
  } else {
    status.textContent = 'All values valid — edit cells directly, then export as ZIP';
  }
}

// ─── Sync DOM inputs back to data ───

function syncFromDOM() {
  const table = document.getElementById('activeTable');
  if (!table) return;
  const tableId = table.dataset.id;
  const inputs = table.querySelectorAll('input[data-row]');
  inputs.forEach(input => {
    const ri = parseInt(input.dataset.row);
    const col = input.dataset.col;
    if (data[tableId] && data[tableId][ri]) {
      data[tableId][ri][col] = input.value;
    }
  });
}

// ─── Keyboard navigation ───

document.addEventListener('keydown', (e) => {
  if (e.target.tagName !== 'INPUT') return;
  const td = e.target.parentElement;
  const tr = td.parentElement;
  const table = tr.parentElement;
  const cells = [...tr.querySelectorAll('td input')];
  const colIdx = cells.indexOf(e.target);
  const rows = [...table.querySelectorAll('tr')];
  const rowIdx = rows.indexOf(tr);

  let targetInput = null;

  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    if (colIdx < cells.length - 1) targetInput = cells[colIdx + 1];
    else if (rowIdx < rows.length - 1) targetInput = rows[rowIdx + 1]?.querySelector('td input');
  } else if (e.key === 'Tab' && e.shiftKey) {
    e.preventDefault();
    if (colIdx > 0) targetInput = cells[colIdx - 1];
    else if (rowIdx > 1) { const prevCells = [...rows[rowIdx - 1].querySelectorAll('td input')]; targetInput = prevCells[prevCells.length - 1]; }
  } else if (e.key === 'ArrowDown') {
    if (rowIdx < rows.length - 1) { const nextCells = [...rows[rowIdx + 1].querySelectorAll('td input')]; targetInput = nextCells[colIdx]; }
  } else if (e.key === 'ArrowUp') {
    if (rowIdx > 1) { const prevCells = [...rows[rowIdx - 1].querySelectorAll('td input')]; targetInput = prevCells[colIdx]; }
  } else if (e.key === 'Enter') {
    if (rowIdx < rows.length - 1) { const nextCells = [...rows[rowIdx + 1].querySelectorAll('td input')]; targetInput = nextCells[colIdx]; }
  }

  if (targetInput) { targetInput.focus(); targetInput.select(); }
});

// ─── Init ───

initBaseline();
renderTabs();
renderTable(activeTab);
</script>
